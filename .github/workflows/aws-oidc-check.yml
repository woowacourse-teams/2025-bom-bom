name: AWS OIDC Check

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: AWS 인증 확인
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: STS 확인
        run: aws sts get-caller-identity

      - name: S3 접근 확인
        run: aws s3 ls s3://${{ secrets.CODEDEPLOY_S3_BUCKET }}

      - name: CodeDeploy Application 확인
        run: |
          aws deploy get-application \
            --application-name ${{ secrets.CODEDEPLOY_APPLICATION_NAME }}

name: Backend Blue-Green Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/bom-bom-server/**"
      - ".github/workflows/blue-green-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  WORKING_BRANCH: main
  CODEDEPLOY_BUNDLE_PREFIX: bom-bom
  DOCKER_IMAGE_TAG: prod-${{ github.sha }}

jobs:
  # 0) Release ID 생성 (후보/안정판 폴더 공통 식별자)
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.mk.outputs.release_id }}
    steps:
      - id: mk
        run: echo "release_id=$(date +%Y%m%d-%H%M%S)-${GITHUB_SHA::12}" >> $GITHUB_OUTPUT

  # ---------------------------------------------------
  # 1️⃣ Build & Test & Push
  # ---------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: prepare-release
    defaults:
      run:
        working-directory: ./backend/bom-bom-server

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ env.WORKING_BRANCH }}

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: application.yml 생성 (Prod 환경)
        env:
          APPLICATION_PROD_PROPERTIES: ${{ secrets.APPLICATION_PROD_PROPERTIES }}
        run: |
          mkdir -p src/main/resources
          printf '%s' "${APPLICATION_PROD_PROPERTIES}" > src/main/resources/application.yml

      - name: Gradle 빌드
        run: ./gradlew clean assemble --no-daemon --stacktrace --info

      - name: JAR 업로드
        uses: actions/upload-artifact@v4
        with:
          name: bom-bom-jar
          path: ./backend/bom-bom-server/build/libs/*.jar
          if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./backend/bom-bom-server

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ env.WORKING_BRANCH }}

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: application.yml 생성 (Test)
        env:
          APPLICATION_TEST_PROPERTIES: ${{ secrets.APPLICATION_TEST_PROPERTIES }}
        run: |
          mkdir -p src/test/resources
          printf '%s' "${APPLICATION_TEST_PROPERTIES}" > src/test/resources/application.yml

      - name: 테스트 실행
        env:
          SPRING_PROFILES_ACTIVE: test
          APPLE_P8_ESCAPED: ${{ secrets.APPLE_P8_ESCAPED }}
        run: |
          export OAUTH2_APPLE_PRIVATE_KEY="$(printf '%b' "$APPLE_P8_ESCAPED")"
          ./gradlew test --no-daemon --stacktrace --info

  docker-image:
    runs-on: ubuntu-latest
    needs: [build, test]
    defaults:
      run:
        working-directory: ./backend/bom-bom-server
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ env.WORKING_BRANCH }}

      - name: JAR 다운로드
        uses: actions/download-artifact@v4
        with:
          name: bom-bom-jar
          path: ./backend/bom-bom-server/build/libs

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시
        run: |
          docker buildx build \
            --platform linux/arm64,linux/amd64 \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:prod \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:${{ env.DOCKER_IMAGE_TAG }} \
            --push .
          echo "✅ Docker 이미지 푸시 완료"

  # ---------------------------------------------------
  # 2️⃣ prod6 배포 준비 (트래픽 전환)
  # ---------------------------------------------------
  shift-traffic-to-prod6:
    name: "🔀 Step 1: 트래픽을 prod6로 이동"
    needs: docker-image
    runs-on: [self-hosted, lb]
    steps:
      - name: prod7 → prod6 트래픽 이동
        run: |
          echo "🔄 prod7 서버 비활성화"
          echo "disable server app_servers/prod7" | sudo socat stdio /var/run/haproxy.sock
          echo "✅ 모든 트래픽이 prod6로 이동되었습니다."

  # ---------------------------------------------------
  # 3️⃣ prod-sub 배포
  # ---------------------------------------------------
  deploy-prod7:
    name: "🚀 Step 2: prod7 배포"
    needs: [prepare-release, shift-traffic-to-prod6]
    runs-on: ubuntu-latest
    outputs:
      deployment_id: ${{ steps.deploy.outputs.deployment_id }}
    defaults:
      run:
        working-directory: ./backend/bom-bom-server

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ env.WORKING_BRANCH }}

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CodeDeploy 번들 생성
        run: |
          printf 'DOCKER_IMAGE=%s/bom-bom:%s\n' \
            "${{ secrets.DOCKERHUB_USERNAME }}" \
            "${{ env.DOCKER_IMAGE_TAG }}" > release.env

          test -f appspec.yml
          test -f docker-compose-prod.yml
          test -f release.env
          test -d scripts/deploy

          zip -r deploy-prod7.zip \
            appspec.yml \
            docker-compose-prod.yml \
            release.env \
            scripts/deploy

          unzip -l deploy-prod7.zip

      - name: CodeDeploy 번들 업로드
        run: |
          aws s3 cp deploy-prod7.zip \
            s3://${{ secrets.CODEDEPLOY_S3_BUCKET }}/${{ env.CODEDEPLOY_BUNDLE_PREFIX }}/prod7-${{ github.sha }}.zip

      - name: prod7 CodeDeploy 배포 시작
        id: deploy
        run: |
          DEPLOYMENT_ID="$(aws deploy create-deployment \
            --application-name "${{ secrets.CODEDEPLOY_APPLICATION_NAME }}" \
            --deployment-group-name "${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP_PROD_SUB }}" \
            --s3-location bucket=${{ secrets.CODEDEPLOY_S3_BUCKET }},key=${{ env.CODEDEPLOY_BUNDLE_PREFIX }}/prod7-${{ github.sha }}.zip,bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --auto-rollback-configuration enabled=true,events=DEPLOYMENT_FAILURE \
            --query deploymentId \
            --output text)"
          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "Deployment ID: ${DEPLOYMENT_ID}"

      - name: prod7 CodeDeploy 배포 완료 대기
        run: |
          aws deploy wait deployment-successful \
            --deployment-id "${{ steps.deploy.outputs.deployment_id }}"

  # ---------------------------------------------------
  # 4️⃣ prod7 배포 실패 시 rollback
  # ---------------------------------------------------
  # X-1) prod7 배포 실패 시 트래픽 상태 정리 (prod6 활성, prod7 비활성 보장)
  rollback-prod7-prepare:
    if: ${{ always() && needs.deploy-prod7.result == 'failure' }}
    needs: deploy-prod7
    runs-on: [ self-hosted, lb ]
    steps:
      - name: 트래픽 상태 정리 (prod6 active / prod7 disabled)
        run: |
          echo "enable server app_servers/prod6" | sudo socat stdio /var/run/haproxy.sock
          echo "disable server app_servers/prod7"   | sudo socat stdio /var/run/haproxy.sock
          echo "✅ 트래픽 상태 정리 완료"

  # X-2) CodeDeploy 자동 rollback 완료 대기
  rollback-prod7-wait:
    if: ${{ always() && needs.deploy-prod7.result == 'failure' }}
    needs: [deploy-prod7, rollback-prod7-prepare]
    runs-on: ubuntu-latest
    steps:
      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: prod7 CodeDeploy rollback 완료 대기
        env:
          ORIGINAL_DEPLOYMENT_ID: ${{ needs.deploy-prod7.outputs.deployment_id }}
        run: |
          set -euo pipefail

          if [ -z "${ORIGINAL_DEPLOYMENT_ID}" ] || [ "${ORIGINAL_DEPLOYMENT_ID}" = "None" ]; then
            echo "❌ prod7 원본 deployment id가 없어 자동 rollback을 추적할 수 없습니다."
            exit 1
          fi

          echo "원본 prod7 deployment: ${ORIGINAL_DEPLOYMENT_ID}"

          ROLLBACK_DEPLOYMENT_ID=""
          for i in {1..30}; do
            ROLLBACK_DEPLOYMENT_ID="$(aws deploy get-deployment \
              --deployment-id "${ORIGINAL_DEPLOYMENT_ID}" \
              --query 'deploymentInfo.rollbackInfo.rollbackDeploymentId' \
              --output text 2>/dev/null || true)"

            if [ -n "${ROLLBACK_DEPLOYMENT_ID}" ] && [ "${ROLLBACK_DEPLOYMENT_ID}" != "None" ]; then
              echo "rollback deployment 발견: ${ROLLBACK_DEPLOYMENT_ID}"
              break
            fi

            STATUS="$(aws deploy get-deployment \
              --deployment-id "${ORIGINAL_DEPLOYMENT_ID}" \
              --query 'deploymentInfo.status' \
              --output text 2>/dev/null || echo unknown)"
            ROLLBACK_MESSAGE="$(aws deploy get-deployment \
              --deployment-id "${ORIGINAL_DEPLOYMENT_ID}" \
              --query 'deploymentInfo.rollbackInfo.rollbackMessage' \
              --output text 2>/dev/null || echo unknown)"

            echo "rollback deployment 대기 중... (${i}/30), original_status=${STATUS}, rollback_message=${ROLLBACK_MESSAGE}"
            sleep 10
          done

          if [ -z "${ROLLBACK_DEPLOYMENT_ID}" ] || [ "${ROLLBACK_DEPLOYMENT_ID}" = "None" ]; then
            echo "❌ CodeDeploy rollback deployment를 찾지 못했습니다. prod7은 disabled 상태로 유지합니다."
            exit 1
          fi

          aws deploy wait deployment-successful \
            --deployment-id "${ROLLBACK_DEPLOYMENT_ID}"

          echo "✅ prod7 CodeDeploy rollback 완료: ${ROLLBACK_DEPLOYMENT_ID}"

  # X-3) rollback된 prod7 로컬 health check
  rollback-prod7-health:
    if: ${{ always() && needs.rollback-prod7-wait.result == 'success' }}
    needs: rollback-prod7-wait
    runs-on: [self-hosted, prod7]
    steps:
      - name: prod7 rollback health check
        run: |
          set -euo pipefail

          HEALTH_CHECK_URL="${HEALTH_CHECK_URL:-http://localhost:8081/actuator/health}"
          INITIAL_DELAY_SECONDS=90
          MAX_RETRIES=10
          REQUIRED_SUCCESS=2
          RETRY_INTERVAL_SECONDS=10

          echo "prod7 rollback health check 시작: ${HEALTH_CHECK_URL}"
          sleep "${INITIAL_DELAY_SECONDS}"

          SUCCESS_COUNT=0
          for ((i=1; i<=MAX_RETRIES; i++)); do
            STATUS="$(curl -s -o /dev/null -w "%{http_code}" "${HEALTH_CHECK_URL}" || echo "000")"

            if [ "${STATUS}" = "200" ]; then
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
              echo "✅ prod7 rollback health success (${SUCCESS_COUNT}/${REQUIRED_SUCCESS}) attempt=${i}/${MAX_RETRIES}"

              if [ "${SUCCESS_COUNT}" -ge "${REQUIRED_SUCCESS}" ]; then
                echo "✅ prod7 rollback health check 통과"
                exit 0
              fi
            else
              echo "⏳ prod7 health status=${STATUS} attempt=${i}/${MAX_RETRIES}"
            fi

            sleep "${RETRY_INTERVAL_SECONDS}"
          done

          echo "❌ prod7 rollback health check 실패. prod7은 disabled 상태로 유지합니다."
          sudo docker logs prod --tail 80 || true
          exit 1

  # X-4) rollback health check 성공 시 prod7 트래픽 복구
  restore-prod7-after-rollback:
    if: ${{ always() && needs.rollback-prod7-health.result == 'success' }}
    needs: rollback-prod7-health
    runs-on: [self-hosted, lb]
    steps:
      - name: prod7 rollback 후 트래픽 복구
        run: |
          echo "enable server app_servers/prod6" | sudo socat stdio /var/run/haproxy.sock
          echo "enable server app_servers/prod7" | sudo socat stdio /var/run/haproxy.sock
          echo "✅ prod7 rollback health check 성공으로 prod7 트래픽을 복구했습니다."

  # ---------------------------------------------------
  # 4️⃣ 트래픽 전환: prod6 → prod7
  # ---------------------------------------------------
  shift-traffic-to-prod7:
    name: "🔀 Step 3: 트래픽을 prod7로 전환"
    needs: deploy-prod7
    runs-on: [self-hosted, lb]
    steps:
      - name: prod6 → prod7 트래픽 이동
        run: |
          echo "🔄 prod6 비활성화"
          echo "disable server app_servers/prod6" | sudo socat stdio /var/run/haproxy.sock
          echo "🔄 prod7 활성화"
          echo "enable server app_servers/prod7" | sudo socat stdio /var/run/haproxy.sock
          echo "✅ 트래픽이 prod7으로 이동되었습니다."

  # ---------------------------------------------------
  # 5️⃣ prod6 배포
  # ---------------------------------------------------
  deploy-prod6:
    name: "🚀 Step 4: prod6 배포"
    needs: [prepare-release, shift-traffic-to-prod7]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend/bom-bom-server

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ env.WORKING_BRANCH }}

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CodeDeploy 번들 생성
        run: |
          printf 'DOCKER_IMAGE=%s/bom-bom:%s\n' \
            "${{ secrets.DOCKERHUB_USERNAME }}" \
            "${{ env.DOCKER_IMAGE_TAG }}" > release.env

          test -f appspec.yml
          test -f docker-compose-prod.yml
          test -f release.env
          test -d scripts/deploy

          zip -r deploy-prod6.zip \
            appspec.yml \
            docker-compose-prod.yml \
            release.env \
            scripts/deploy

          unzip -l deploy-prod6.zip

      - name: CodeDeploy 번들 업로드
        run: |
          aws s3 cp deploy-prod6.zip \
            s3://${{ secrets.CODEDEPLOY_S3_BUCKET }}/${{ env.CODEDEPLOY_BUNDLE_PREFIX }}/prod6-${{ github.sha }}.zip

      - name: prod6 CodeDeploy 배포 시작
        id: deploy
        run: |
          DEPLOYMENT_ID="$(aws deploy create-deployment \
            --application-name "${{ secrets.CODEDEPLOY_APPLICATION_NAME }}" \
            --deployment-group-name "${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP_PROD_MAIN }}" \
            --s3-location bucket=${{ secrets.CODEDEPLOY_S3_BUCKET }},key=${{ env.CODEDEPLOY_BUNDLE_PREFIX }}/prod6-${{ github.sha }}.zip,bundleType=zip \
            --file-exists-behavior OVERWRITE \
            --auto-rollback-configuration enabled=true,events=DEPLOYMENT_FAILURE \
            --query deploymentId \
            --output text)"
          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "Deployment ID: ${DEPLOYMENT_ID}"

      - name: prod6 CodeDeploy 배포 완료 대기
        run: |
          aws deploy wait deployment-successful \
            --deployment-id "${{ steps.deploy.outputs.deployment_id }}"

  # ---------------------------------------------------
  # 5️⃣ prod6 배포 실패 시 rollback
  # ---------------------------------------------------
  # X-1) 메인 롤백 시작: 트래픽 상태 정리 (prod7만 활성, prod6 비활성 보장)
  rollback-prod6-prepare:
    if: failure() && needs.deploy-prod6.result == 'failure'
    needs: deploy-prod6
    runs-on: [self-hosted, lb]
    steps:
      - name: 트래픽 상태 정리 (prod7 active / prod6 disabled)
        run: |
          echo "disable server app_servers/prod6" | sudo socat stdio /var/run/haproxy.sock
          echo "enable server app_servers/prod7"   | sudo socat stdio /var/run/haproxy.sock
          echo "✅ 트래픽 상태 정리 완료"

  # ---------------------------------------------------
  # 6️⃣ 성공 시 안정판 승격 (compose & 이미지)
  # ---------------------------------------------------
  promote-stable-image:
    needs: [deploy-prod7, deploy-prod6]
    if: ${{ needs.deploy-prod7.result == 'success' && needs.deploy-prod6.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: latest-stable → 새 안정판으로 갱신
        run: |
          SRC="${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:${{ env.DOCKER_IMAGE_TAG }}"
          docker pull "$SRC"
          docker tag "$SRC" "${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:latest-stable"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:latest-stable"
          echo "✅ latest-stable 갱신 완료"

  # ---------------------------------------------------
  # 7️⃣ 트래픽 복구
  # ---------------------------------------------------
  restore-final-traffic:
    name: "🔁 Step 5: 트래픽 원상복구"
    needs: deploy-prod6
    runs-on: [self-hosted, lb]
    steps:
      - name: HAProxy 트래픽 비율 복귀
        run: |
          echo "🔄 모두 재활성화"
          echo "enable server app_servers/prod6" | sudo socat stdio /var/run/haproxy.sock
          echo "enable server app_servers/prod7" | sudo socat stdio /var/run/haproxy.sock
          echo "✅ 배포 완료 및 트래픽 정상화"

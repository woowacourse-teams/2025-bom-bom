name: CodeDeploy Prod7 Check

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-prod7-check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend/bom-bom-server

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CodeDeploy 번들 생성
        run: |
          zip -r deploy.zip \
            appspec.yml \
            docker-compose-prod-sub.yml \
            scripts/deploy

      - name: S3 업로드
        run: |
          aws s3 cp deploy.zip \
            s3://${{ secrets.CODEDEPLOY_S3_BUCKET }}/bom-bom/prod7-check-${{ github.sha }}.zip

      - name: prod7 CodeDeploy 배포 시작
        id: deploy
        run: |
          DEPLOYMENT_ID="$(aws deploy create-deployment \
            --application-name "${{ secrets.CODEDEPLOY_APPLICATION_NAME }}" \
            --deployment-group-name "${{ secrets.CODEDEPLOY_DEPLOYMENT_GROUP_PROD_SUB }}" \
            --s3-location bucket=${{ secrets.CODEDEPLOY_S3_BUCKET }},key=bom-bom/prod7-check-${{ github.sha }}.zip,bundleType=zip \
            --query deploymentId \
            --output text)"

          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "Deployment ID: ${DEPLOYMENT_ID}"

      - name: prod7 CodeDeploy 배포 완료 대기
        run: |
          aws deploy wait deployment-successful \
            --deployment-id "${{ steps.deploy.outputs.deployment_id }}"

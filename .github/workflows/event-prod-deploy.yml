name: Backend event-prod Server

on:
  push:
    branches:
      - server-event

permissions:
  contents: read
  checks: write

concurrency:
  group: event-dev-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: ./backend/bom-bom-server

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: gradle

      - name: application.yml(메인/테스트) 생성
        shell: bash
        env:
          APPLICATION_MAIN_PROPERTIES: ${{ secrets.EVENT_APPLICATION_PROD_PROPERTIES}}
          APPLICATION_TEST_PROPERTIES: ${{ secrets.APPLICATION_TEST_PROPERTIES }}
        run: |
          set -euo pipefail
          mkdir -p src/main/resources src/test/resources
          printf '%s' "${APPLICATION_MAIN_PROPERTIES:?APPLICATION_MAIN_PROPERTIES 시크릿이 없습니다}" > src/main/resources/application.yml
          printf '%s' "${APPLICATION_TEST_PROPERTIES:?APPLICATION_TEST_PROPERTIES 시크릿이 없습니다}" > src/test/resources/application.yml

      - name: 테스트 실행
        shell: bash
        env:
          SPRING_PROFILES_ACTIVE: test
          APPLE_P8_ESCAPED: ${{ secrets.APPLE_P8_ESCAPED }}
        run: |
          set -euo pipefail
          APPLE_P8_ESCAPED_RAW="$(printf '%b' "${APPLE_P8_ESCAPED:?APPLE_P8_ESCAPED 시크릿이 없습니다}")"
          echo "::add-mask::${APPLE_P8_ESCAPED_RAW}"
          export OAUTH2_APPLE_PRIVATE_KEY="$APPLE_P8_ESCAPED_RAW"
          ./gradlew test --no-daemon

      - name: JAR 생성
        run: ./gradlew bootJar -x test --no-daemon

      - name: 현재 위치/파일 + JAR 확인
        run: |
          set -euo pipefail
          echo "[PWD]"
          pwd
          echo "[LS]"
          ls -al
          echo "[build/libs]"
          ls -al build/libs

      - name: 테스트 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-test-results
          path: backend/bom-bom-server/build/test-results/test/*.xml
          if-no-files-found: ignore

      - name: 테스트 리포트 생성
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Report
          path: backend/bom-bom-server/build/test-results/test/*.xml
          reporter: java-junit

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 및 푸시 (event-dev)
        run: |
          set -euo pipefail

          if ! docker buildx inspect ci-builder &>/dev/null; then
            docker buildx create --use --name ci-builder
          else
            docker buildx use ci-builder
          fi

          # 현재 working-directory가 ./backend/bom-bom-server 이므로 컨텍스트는 '.' 가 맞음
          docker buildx build \
            --platform linux/arm64,linux/amd64 \
            --cache-from=type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:buildcache-event-dev \
            --cache-to=type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:buildcache-event-dev,mode=max \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:event-dev \
            --push \
            .

  deploy-main:
    needs: build
    runs-on: [ self-hosted, spot1]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./backend/bom-bom-server

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 Pull
        run: |
          set -euo pipefail
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:event-dev
          docker pull "$IMAGE"

      - name: 이미지 변경 여부 확인
        id: compare_digest
        run: |
          set -euo pipefail
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:event-dev

          NEW=$(docker image inspect --format='{{.Id}}' "$IMAGE")

          # ⚠️ 아래 컨테이너 이름은 docker-compose-event-dev.yml의 container_name과 반드시 동일해야 함
          CONTAINER_NAME=bombom-server-event-dev

          if docker inspect "$CONTAINER_NAME" &>/dev/null; then
            CURRENT=$(docker inspect --format='{{.Image}}' "$CONTAINER_NAME")
          else
            CURRENT="not_found"
          fi

          echo "new_image_id=$NEW" >> $GITHUB_OUTPUT
          echo "current_image_id=$CURRENT" >> $GITHUB_OUTPUT

          if [ "$NEW" = "$CURRENT" ]; then
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: .env 파일 생성 (redis 제외)
        run: |
          set -euo pipefail
          {
            echo "DEV_SPRING_DATASOURCE_URL=${{ secrets.EVENT_PROD_SPRING_DATASOURCE_URL }}"
            echo "DEV_SPRING_DATASOURCE_USERNAME=${{ secrets.PROD_MYSQL_USER }}"
            echo "DEV_SPRING_DATASOURCE_PASSWORD=${{ secrets.PROD_MYSQL_PASSWORD }}"
          } > .env

          echo "::add-mask::${{ secrets.PROD_MYSQL_PASSWORD }}"

      - name: 환경변수 검증
        run: |
          set -euo pipefail
          docker compose -f docker-compose-event-dev.yml --env-file .env config | grep -E 'SPRING_|OTEL_' || true

      - name: 컨테이너 재실행 (p8 ENV 주입)
        if: steps.compare_digest.outputs.skip_deploy != 'true'
        shell: bash
        env:
          APPLE_P8_ESCAPED: ${{ secrets.APPLE_P8_ESCAPED }}
        run: |
          set -euo pipefail
          OAUTH2_APPLE_PRIVATE_KEY_RAW="$(printf '%b' "${APPLE_P8_ESCAPED:?APPLE_P8_ESCAPED 시크릿이 없습니다}")"
          echo "::add-mask::${OAUTH2_APPLE_PRIVATE_KEY_RAW}"

          docker compose --env-file .env -f docker-compose-event-dev.yml down || true
          OAUTH2_APPLE_PRIVATE_KEY="$OAUTH2_APPLE_PRIVATE_KEY_RAW" \
          docker compose --env-file .env -f docker-compose-event-dev.yml up -d

      - name: Docker 리소스 정리
        if: steps.compare_digest.outputs.skip_deploy == 'false'
        run: |
          set -euo pipefail
          docker container prune -f --filter "until=24h"
          docker image prune -f --filter "until=24h"
  
  deploy-sub:
    needs: build
    runs-on: [ self-hosted, spot2]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./backend/bom-bom-server

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: DockerHub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 Pull
        run: |
          set -euo pipefail
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:event-dev
          docker pull "$IMAGE"

      - name: 이미지 변경 여부 확인
        id: compare_digest
        run: |
          set -euo pipefail
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/bom-bom:event-dev

          NEW=$(docker image inspect --format='{{.Id}}' "$IMAGE")

          # ⚠️ 아래 컨테이너 이름은 docker-compose-event-dev.yml의 container_name과 반드시 동일해야 함
          CONTAINER_NAME=bombom-server-event-dev

          if docker inspect "$CONTAINER_NAME" &>/dev/null; then
            CURRENT=$(docker inspect --format='{{.Image}}' "$CONTAINER_NAME")
          else
            CURRENT="not_found"
          fi

          echo "new_image_id=$NEW" >> $GITHUB_OUTPUT
          echo "current_image_id=$CURRENT" >> $GITHUB_OUTPUT

          if [ "$NEW" = "$CURRENT" ]; then
            echo "skip_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "skip_deploy=false" >> $GITHUB_OUTPUT
          fi

      - name: .env 파일 생성 (redis 제외)
        run: |
          set -euo pipefail
          {
            echo "DEV_SPRING_DATASOURCE_URL=${{ secrets.EVENT_PROD_SPRING_DATASOURCE_URL }}"
            echo "DEV_SPRING_DATASOURCE_USERNAME=${{ secrets.PROD_MYSQL_USER }}"
            echo "DEV_SPRING_DATASOURCE_PASSWORD=${{ secrets.PROD_MYSQL_PASSWORD }}"
          } > .env

          echo "::add-mask::${{ secrets.DEV_SPRING_DATASOURCE_PASSWORD }}"

      - name: 환경변수 검증
        run: |
          set -euo pipefail
          docker compose -f docker-compose-event-dev.yml --env-file .env config | grep -E 'SPRING_|OTEL_' || true

      - name: 컨테이너 재실행 (p8 ENV 주입)
        if: steps.compare_digest.outputs.skip_deploy != 'true'
        shell: bash
        env:
          APPLE_P8_ESCAPED: ${{ secrets.APPLE_P8_ESCAPED }}
        run: |
          set -euo pipefail
          OAUTH2_APPLE_PRIVATE_KEY_RAW="$(printf '%b' "${APPLE_P8_ESCAPED:?APPLE_P8_ESCAPED 시크릿이 없습니다}")"
          echo "::add-mask::${OAUTH2_APPLE_PRIVATE_KEY_RAW}"

          docker compose --env-file .env -f docker-compose-event-dev.yml down || true
          OAUTH2_APPLE_PRIVATE_KEY="$OAUTH2_APPLE_PRIVATE_KEY_RAW" \
          docker compose --env-file .env -f docker-compose-event-dev.yml up -d

      - name: Docker 리소스 정리
        if: steps.compare_digest.outputs.skip_deploy == 'false'
        run: |
          set -euo pipefail
          docker container prune -f --filter "until=24h"
          docker image prune -f --filter "until=24h"

  

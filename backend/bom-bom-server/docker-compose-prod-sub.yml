services:
  bombom-server-prod:
    image: bombomnewsletter/bom-bom:prod
    pull_policy: always
    restart: unless-stopped
    init: true
    container_name: bombom-server-prod-sub
    ports:
      - 80:8080
      - 8081:8081
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://${RDS_ENDPOINT}:3306/${DATABASE}?useSSL=false&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      LOGGING_FILE_NAME: /logs/bombom-prod.log

      # Apple p8 (ENV로 주입)
      OAUTH2_APPLE_PRIVATE_KEY: ${OAUTH2_APPLE_PRIVATE_KEY}

      #### --------------------------------------
      #### OpenTelemetry (전체 주석 처리)
      JAVA_TOOL_OPTIONS: "-javaagent:/otel/opentelemetry-javaagent.jar"
      OTEL_SERVICE_NAME: bombom-server-prod
      OTEL_EXPORTER_OTLP_ENDPOINT: ${PROD_OTEL_ENDPOINT}
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_TRACES_SAMPLER: traceidratio
      OTEL_TRACES_SAMPLER_ARG: "0.2"
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: otlp
      OTEL_RESOURCE_ATTRIBUTES: "service.name=bombom-server-prod,service.instance.id=bombom-prod-1"
      OTEL_PROPAGATORS: tracecontext,baggage
      OTEL_INSTRUMENTATION_HTTP_SERVER_EXCLUDE_URLS: /actuator/.*

    volumes:
      - /home/ec2-user/bombom-prod/logs:/logs
      - /home/ec2-user/bombom-prod/opentelemetry/opentelemetry-javaagent.jar:/otel/opentelemetry-javaagent.jar

    logging:
      driver: json-file
      options:
        max-size: "30m"
        max-file: "5"

    # 컨테이너 graceful shutdown 대기 시간
    stop_grace_period: 40s

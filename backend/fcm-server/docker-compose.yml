version: "3.8"

services:
  fcm-app:
    container_name: bombom-fcm
    image: bombom-fcm:latest
    ports:
      - "8080:8080"
    expose:
      - "8081" # 내부에서만 metrics 포트(또는 management 포트) 노출
    environment:
      TZ: Asia/Seoul
      GOOGLE_APPLICATION_CREDENTIALS: /app/key/bombom-fcm.json
    volumes:
      - /srv/bombom/secrets/bombom-fcm.json:/app/key/bombom-fcm.json:ro
      - /srv/bombom/logs:/app/logs
    ulimits:
      nofile: # 한 프로세스가 동시에 열어둘 수 있는 fd 최대 개수
        soft: 32768
        hard: 65536
    logging:
      driver: "local"
      options:
        max-size: "50m"
        max-file: "5"
    networks:
      - default
      - ec2_user_default

networks:
  ec2_user_default:
    external: true
    name: ec2-user_default
